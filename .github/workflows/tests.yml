name: stac-js tests
on: [push, pull_request]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run lint
      - run: npm run docs:lint
      - run: npm run format
      - run: npm test
